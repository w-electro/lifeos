<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>LifeOS</title>
  <meta name="description" content="Your personal life strategy system. Morning strategy, evening reflection, honest goals.">

  <meta name="theme-color" content="#0C0B09">
  <link rel="manifest" href="manifest.json">

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="LifeOS">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">

  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="offline-note" id="offlineNote" hidden>Offline — your entries are safe on this device.</div>

  <header class="masthead">
    <svg class="mark" viewBox="0 0 48 48" aria-hidden="true">
      <path d="M10 30 A14 14 0 0 1 38 30" fill="none" stroke="var(--gold)" stroke-width="2.6" stroke-linecap="round"/>
      <line x1="6" y1="30" x2="42" y2="30" stroke="var(--gold)" stroke-width="2.6" stroke-linecap="round"/>
    </svg>
    <h1>Life<span>OS</span></h1>
    <p class="date" id="dateLine"></p>
  </header>

  <main>
    <!-- Signature: the day arc -->
    <section class="day-arc" aria-label="Time of day">
      <svg viewBox="0 0 320 130" id="arcSvg">
        <path d="M30 112 A130 130 0 0 1 290 112" fill="none" stroke="var(--gold-dim)" stroke-width="1.5"/>
        <line x1="12" y1="112" x2="308" y2="112" stroke="var(--gold-dim)" stroke-width="1.5"/>
        <circle id="sunDot" r="7" fill="var(--gold)"/>
      </svg>
      <p class="phase" id="phaseLine"></p>
    </section>

    <section class="card" id="todayCard">
      <h2 id="entryHeading">Morning strategy</h2>
      <p class="hint" id="entryHint"></p>
      <textarea id="entryText" rows="7" placeholder="" spellcheck="false"></textarea>
      <button class="btn" id="saveEntry">Save entry</button>
    </section>

    <section class="card">
      <h2>Goals</h2>
      <ul class="goals" id="goalList"></ul>
      <p class="hint" id="goalsEmpty">No active goals. Name one thing you're actually working toward.</p>
      <form id="goalForm" class="goal-form">
        <input type="text" id="goalName" placeholder="New goal" maxlength="80" required>
        <button class="btn" type="submit">Add goal</button>
      </form>
    </section>

    <section class="card">
      <h2>Journal</h2>
      <ul class="journal" id="journalList"></ul>
      <p class="hint" id="journalEmpty">Saved entries collect here, newest first.</p>
    </section>
  </main>

  <footer>
    <p>Runs on your schedule. Read on your phone.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
